<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Médico Veterinário - VetBooking</title>
    <link rel="stylesheet" href="../styles/cadastro-MV.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header/Navbar -->
    <nav>
        <a href="../index.html" class="logo">
            <img src="../img/WhatsApp Image 2024-09-26 at 13.36.23 (1).jpeg" alt="VetBooking Logo">
        </a>
        <div class="nav-links">
            <a href="../index.html">Página Inicial</a>
            <a href="#">Sobre</a>
        </div>
        <div class="burger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </nav>

    <!-- Cadastro Container -->
    <div class="container">
        <form action="/submit-MV" method="POST" class="form-cadastro-MV">
            <h1>Cadastro de Médico Veterinário</h1>
            
            <!-- Informações Pessoais -->
            <div class="form-group">
                <label for="full-name">Nome Completo</label>
                <input type="text" id="full-name" name="full-name" placeholder="Seu nome completo" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Seu email profissional" required>
            </div>
            
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Crie uma senha segura" required>
            </div>
            
            <div class="form-group">
                <label for="confirm-password">Confirmar Senha</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirme sua senha" required>
            </div>
            
            <!-- Informações Profissionais -->
            <div class="form-group">
                <label for="CRMV">CRMV</label>
                <input type="text" id="CRMV" name="CRMV" placeholder="Seu número de registro" required>
            </div>
            
            <div class="form-group">
                <label for="state">UF do CRMV</label>
                <select id="state" name="state" required>
                    <option value="">Selecione o estado</option>
                    <option value="AC">Acre</option>
                    <option value="AL">Alagoas</option>
                    <option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option>
                    <option value="BA">Bahia</option>
                    <option value="CE">Ceará</option>
                    <option value="DF">Distrito Federal</option>
                    <option value="ES">Espírito Santo</option>
                    <option value="GO">Goiás</option>
                    <option value="MA">Maranhão</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="MS">Mato Grosso do Sul</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="PA">Pará</option>
                    <option value="PB">Paraíba</option>
                    <option value="PR">Paraná</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PI">Piauí</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="RO">Rondônia</option>
                    <option value="RR">Roraima</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="SP">São Paulo</option>
                    <option value="SE">Sergipe</option>
                    <option value="TO">Tocantins</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Especialidades</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="esp-clinica" name="especialidades[]" value="Clínica Geral">
                        <label for="esp-clinica">Clínica Geral</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="esp-cirurgia" name="especialidades[]" value="Cirurgia">
                        <label for="esp-cirurgia">Cirurgia</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="esp-dermatologia" name="especialidades[]" value="Dermatologia">
                        <label for="esp-dermatologia">Dermatologia</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="esp-cardiologia" name="especialidades[]" value="Cardiologia">
                        <label for="esp-cardiologia">Cardiologia</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="esp-ortopedia" name="especialidades[]" value="Ortopedia">
                        <label for="esp-ortopedia">Ortopedia</label>
                    </div>
                </div>
            </div>
            
            <!-- Perfil Público -->
            <div class="form-group">
                <label for="profile-photo">Foto de Perfil</label>
                <div class="file-upload">
                    <input type="file" id="profile-photo" name="profile-photo" class="file-input">
                    <div class="file-preview">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <label for="profile-photo" class="file-label">Escolher Foto</label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description">Descrição Profissional</label>
                <textarea id="description" name="description" placeholder="Descreva sua experiência, formação e áreas de atuação" rows="5"></textarea>
            </div>
            
            <div class="form-group">
                <label for="phone">Telefone de Contato</label>
                <input type="tel" id="phone" name="phone" placeholder="(00) 00000-0000">
            </div>
            
            <button type="submit">Finalizar Cadastro</button>
            
            <div class="form-group" style="text-align: center; margin-top: 1rem;">
                <p>Já possui uma conta? <a href="./login.html">Faça login</a></p>
            </div>
        </form>
    </div>

    <script>
        // Script para o menu mobile
        const burger = document.querySelector('.burger');
        const nav = document.querySelector('.nav-links');

        burger.addEventListener('click', () => {
            nav.classList.toggle('nav-active');
            burger.classList.toggle('toggle');
        });
    </script>
</body>
</html>
